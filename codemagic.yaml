workflows:
  ios-trollstore-ipa:
    name: iOS TrollStore IPA Build
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      vars:
        XCODE_PROJECT: "ios/QuizTool/QuizTool.xcodeproj"
        XCODE_SCHEME: "QuizTool"
        BUNDLE_ID: "app.calcite4884.lyra3161"
    scripts:
      - name: Verify app files
        script: |
          test -f ios/QuizTool/QuizTool/ViewController.swift
          test -f ios/QuizTool/QuizTool/QuestionParser.swift
          test -f ios/QuizTool/QuizTool/Info.plist
          grep -q "李子" ios/QuizTool/QuizTool/Info.plist
          test -f ios/QuizTool/QuizTool/Assets.xcassets/AppIcon.appiconset/Icon-60-60@3x.png
      - name: Build unsigned device app
        script: |
          set -e
          xcodebuild \
            -project "$XCODE_PROJECT" \
            -scheme "$XCODE_SCHEME" \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath build/DerivedData \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            DEVELOPMENT_TEAM="" \
            PRODUCT_BUNDLE_IDENTIFIER="$BUNDLE_ID" \
            clean build
      - name: Package TrollStore IPA
        script: |
          set -e
          APP_PATH=$(find build/DerivedData/Build/Products/Release-iphoneos -maxdepth 1 -name "*.app" -print -quit)
          if [ -z "$APP_PATH" ]; then
            echo "No .app bundle found"
            exit 1
          fi
          rm -rf build/trollstore build/ipa
          mkdir -p build/trollstore/Payload build/ipa
          cp -R "$APP_PATH" build/trollstore/Payload/Lizi.app
          /usr/bin/codesign --force --sign - --timestamp=none build/trollstore/Payload/Lizi.app || true
          (cd build/trollstore && /usr/bin/zip -qry ../ipa/Lizi-TrollStore.ipa Payload)
          /usr/bin/unzip -l build/ipa/Lizi-TrollStore.ipa | grep -q "Payload/Lizi.app/Info.plist"
    artifacts:
      - build/ipa/Lizi-TrollStore.ipa

  ios-ipa:
    name: iOS IPA Build
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      ios_signing:
        distribution_type: ad_hoc
        bundle_identifier: app.calcite4884.lyra3161
      vars:
        XCODE_PROJECT: "ios/QuizTool/QuizTool.xcodeproj"
        XCODE_SCHEME: "QuizTool"
    scripts:
      - name: Verify app files
        script: |
          test -f ios/QuizTool/QuizTool/ViewController.swift
          test -f ios/QuizTool/QuizTool/QuestionParser.swift
          test -f ios/QuizTool/QuizTool/Info.plist
          grep -q "李子" ios/QuizTool/QuizTool/Info.plist
          grep -q "UIDocumentPickerViewController" ios/QuizTool/QuizTool/ViewController.swift
          grep -q "PDFKit" ios/QuizTool/QuizTool/ViewController.swift
          test -f ios/QuizTool/QuizTool/Assets.xcassets/AppIcon.appiconset/Icon-60-60@3x.png
      - name: Set up code signing settings
        script: |
          xcode-project use-profiles \
            --project "$XCODE_PROJECT" \
            --archive-method ad-hoc \
            --export-options-plist "$HOME/export_options.plist" \
            --code-signing-setup-verbose-logging
          cat "$HOME/export_options.plist"
      - name: Build archive
        script: |
          xcodebuild -project "$XCODE_PROJECT" -scheme "$XCODE_SCHEME" -configuration Release archive -archivePath build/QuizTool.xcarchive
      - name: Export IPA
        script: |
          echo "Available provisioning profiles before export:"
          find "$HOME/Library" -name "*.mobileprovision" -print || true
          mkdir -p "$HOME/Library/MobileDevice/Provisioning Profiles"
          PROFILE_SOURCE=$(find "$HOME/Library" -name "d6963832-1597-4156-ba23-e0cc7ee4861e.mobileprovision" -print -quit)
          if [ -z "$PROFILE_SOURCE" ]; then
            PROFILE_SOURCE=$(find "$HOME/Library" -name "*.mobileprovision" -print -quit)
          fi
          if [ -z "$PROFILE_SOURCE" ]; then
            echo "No provisioning profile found under $HOME/Library"
            exit 1
          fi
          cp "$PROFILE_SOURCE" "$HOME/Library/MobileDevice/Provisioning Profiles/d6963832-1597-4156-ba23-e0cc7ee4861e.mobileprovision"
          xcodebuild -exportArchive -archivePath build/QuizTool.xcarchive -exportPath build/ipa -exportOptionsPlist "$HOME/export_options.plist"
          IPA_PATH=$(find build/ipa -name "*.ipa" -print -quit)
          if [ -z "$IPA_PATH" ]; then
            echo "No IPA exported"
            exit 1
          fi
          mv "$IPA_PATH" build/ipa/Lizi.ipa
    artifacts:
      - build/ipa/Lizi.ipa
